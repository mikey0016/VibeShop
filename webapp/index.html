<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GameVibeShop</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="page-home">

  <main class="main main--home">
    <div class="balance-hero balance-hero--compact">
      <div class="balance-hero__label">Balans</div>
      <div class="balance-hero__amount">
        <span class="header__balance-value">0</span> so'm
      </div>
      <div class="balance-hero__actions">
        <a class="quick-action" href="topup.html">
          <span class="quick-action__icon">💳</span>
          <span class="quick-action__text">Hisobni to'ldirish</span>
        </a>
        <a class="quick-action" href="bonus.html">
          <span class="quick-action__icon">🎟️</span>
          <span class="quick-action__text">Bonus kodlar</span>
        </a>
        <a class="quick-action" href="#" onclick="openSupport(); return false;">
          <span class="quick-action__icon">💬</span>
          <span class="quick-action__text">Qo'llab-quvvatlash</span>
        </a>
      </div>
    </div>

    <div class="cat-tabs">
      <button class="cat-tab active" data-tab="games" onclick="switchHomeTab('games')">O'yinlar</button>
      <button class="cat-tab" data-tab="promo" onclick="switchHomeTab('promo')">Promokodlar</button>
    </div>

    <div id="homeGames" class="games-grid games-grid--home"></div>
    <div id="homePromo" class="games-grid games-grid--home hidden"></div>

    <div class="app-footer">@VibeShop</div>
  </main>

  <nav class="bottom-nav">
    <a class="nav-item active" href="index.html">
      <span class="nav-item__icon">🏠</span>
      <span class="nav-item__label">Bosh sahifa</span>
    </a>
    <a class="nav-item" href="history.html">
      <span class="nav-item__icon">🕐</span>
      <span class="nav-item__label">Tarix</span>
    </a>
    <a class="nav-item" href="settings.html">
      <span class="nav-item__icon">👤</span>
      <span class="nav-item__label">Sozlamalar</span>
    </a>
    <a class="nav-item" href="products.html">
      <span class="nav-item__icon">🛍️</span>
      <span class="nav-item__label">Mahsulotlar</span>
    </a>
  </nav>

  <div id="toast" class="toast"></div>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
