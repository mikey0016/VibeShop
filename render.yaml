# Render.com — VibeShop backend (FastAPI + Telegram bot)
# Dashboard: https://dashboard.render.com → New → Blueprint

services:
  - type: web
    name: vibeshop-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: API_HOST
        value: "0.0.0.0"
      - key: WEBAPP_URL
        value: "https://vibe-shop-uz.netlify.app"
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: SUPPORT_USERNAME
        value: "VibeShop_support"
      - key: PAYMENT_TIMEOUT_MINUTES
        value: "5"
