# VibeShop — https://vibe-shop.netlify.app

[build]
  publish = "webapp"
  command = "node scripts/generate-config.js"

[build.environment]
  API_URL = "https://vibeshop-api.onrender.com"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Access-Control-Allow-Origin = "*"
